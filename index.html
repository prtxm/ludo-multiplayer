<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>6 Player Ludo - by Pritam Sanyal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
<div id="notification-container"></div>
<div id="setup-screen">
    <div class="setup-card">
        <h1>MULTIPLAYER LUDO</h1>
        <p>Enter your name and a Room Code</p>
        <div class="input-grid" style="grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px;">
                
            <div class="input-group">
                <label for="playerName"></label>
                <input type="text" id="playerName" name="playerName" placeholder="Name (e.g. Pritam)" autocomplete="name">
            </div>

            <div class="input-group">
                <label for="roomCode"></label>
                <input type="text" id="roomCode" name="roomCode" placeholder="Room Code (e.g. 1234)" autocomplete="off">
            </div>

        </div>
        <button class="action-btn" onclick="joinMultiplayerRoom()"style="color: #000000;">JOIN / CREATE ROOM</button>
        
        <div id="lobby-status" style="margin-top: 20px; color: #4fc3f7; font-weight: bold;"></div>
        
        <button id="startGameBtn" class="action-btn" onclick="startMultiplayerGame()" style="margin-top: 15px; display: none; background: #00c853;">START GAME</button>
    </div>
</div>

<div id="game-ui" style="display: none;">
    
    <div id="ui-panel" class="mica-panel">
        <div id="timer-container" style="display:none; width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-top: 10px; overflow: hidden;">
            <div id="timer-bar" style="width: 100%; height: 100%; background: #ff4757; transition: width 0.1s linear;"></div>
        </div>
        <div class="label">Current Turn</div>
        <div id="turnDisplay">RED'S TURN</div>
        
        <div class="label">Dice Result</div>
        <div id="diceDisplay">
            <span id="diceIcon">🎲</span>
            <span id="diceNumber">-</span>
        </div>        
        <button id="rollBtn" onclick="gameScene.rollFromUI()">ROLL DICE</button>

        <hr class="mica-divider">
        
        <div class="label">Scoreboard</div>
        <div id="scoreboard"></div>
    </div>

    <div id="chat-panel" class="mica-panel" style="position: absolute; bottom: 50px; left: 20px; width: 250px; top:610px;">
        <div class="label">Quick Chat</div>
        <div id="chat-messages" style="height: 100px; overflow-y: auto; font-size: 12px; margin-bottom: 10px; color: #ccc;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button class="action-btn" onclick="sendChat('Hello!')" style="padding: 5px; color: #000000;">Hello!</button>
            <button class="action-btn" onclick="sendChat('Hurry up!')" style="padding: 5px; color: #000000;">Hurry up!</button>
            <button class="action-btn" onclick="sendChat('Oops!')" style="padding: 5px; color: #000000;">Oops!</button>
            <button class="action-btn" onclick="sendChat('Good Game!')" style="padding: 5px; color: #000000;">Good Game!</button>
        </div>
        <div style="display: flex; gap: 5px; margin-top: 8px;">
            <input type="text" id="customChatInput" class="mica-input" placeholder="Type a message..." style="flex-grow: 1; min-width: 0; padding: 6px; font-size: 11px; box-sizing: border-box;">
            <button class="action-btn" onclick="sendCustomMessage()" style="padding: 6px 12px; width: auto !important; font-size: 11px;">Send</button>
        </div>
    </div>

    <div id="media-panel" class="mica-panel" style="position: absolute; top: 20px; left: 1585px; width: 250px; display: none;">
        <div class="label">Music Player (Host Controls)</div>
        
        <div id="yt-player-container" style="width: 100%; height: 130px; background: #000; border-radius: 8px; margin-bottom: 10px; overflow: hidden;"></div>
        
        <input type="text" id="ytVideoId" class="mica-input" placeholder="Paste YouTube Link or Playlist" style="font-size: 10px; padding: 5px; margin-bottom: 5px; width: 100%; box-sizing: border-box;">
        <button class="action-btn" onclick="broadcastMedia()" style="padding: 5px; width: 100%; margin-bottom: 10px; color: #000000;">Load & Play</button>
        
        <div style="display: flex; justify-content: center; gap: 8px; margin-bottom: 10px;">
            <button class="action-btn" onclick="sendMediaControl('prev')" style="padding: 5px 12px; font-size: 12px; color: #000000;">⏮ Prev</button>
            <button class="action-btn" onclick="sendMediaControl('toggle')" style="padding: 5px 12px; font-size: 12px; color: #000000;">⏯ Play/Pause</button>
            <button class="action-btn" onclick="sendMediaControl('next')" style="padding: 5px 12px; font-size: 12px; color: #000000;">Next ⏭</button>
        </div>
        
        <div class="label">Volume</div>
        <input type="range" id="volSlider" min="0" max="100" value="50" onchange="changeVolume()" style="width: 100%;">
    </div>

    <div id="game-container"></div>
</div>

<script src="game.js"></script>

<script>
    // --- INITIALIZE SOCKET FIRST ---
    const socket = io();
    window.socket = socket; 
    // FIX 1: Change default from 0 to -1 so no one gets accidental host privileges
    window.myPlayerId = -1; 
    window.myRoomCode = "";
    window.playerNames = ["Player 1", "Player 2", "Player 3", "Player 4", "Player 5", "Player 6"];
    window.currentPlayersCount = 0; // Track players globally for the button check

    // --- LOBBY & CONNECTION LOGIC ---
    function joinMultiplayerRoom() {
        const nameInput = document.getElementById("playerName");
        const codeInput = document.getElementById("roomCode");
        const status = document.getElementById("lobby-status");

        const name = nameInput.value.trim();
        const code = codeInput.value.trim();

        if (!name || !code) {
            showNotification("Enter your name and a room code!");
            return;
        }

        // Try to hide the UI, but don't let a UI error stop the game from joining
        try {
            const btn = document.querySelector('button[onclick="joinMultiplayerRoom()"]') || document.getElementById("joinRoomBtn");
            if (btn) btn.style.display = "none";
            
            // Also hide inputs to prevent double-joining
            nameInput.style.display = "none";
            codeInput.style.display = "none";
        } catch (e) {
            console.warn("UI hiding failed, but joining anyway...", e);
        }

        window.myRoomCode = code;
        socket.emit("joinRoom", { playerName: name, roomCode: code });
        status.innerText = "Connecting to " + code + "...";
    }    

    // FIX 3: Centralized function to safely check host UI
    function updateStartButtonVisibility() {
        const startBtn = document.getElementById("startGameBtn");
        // Only show if explicitly confirmed as ID 0 (Host)
        if (window.myPlayerId === 0 && window.currentPlayersCount >= 1) {
            startBtn.style.display = "block";
        } else {
            startBtn.style.display = "none";
        }
    }

    socket.on("joined", (playerInfo) => {
        window.myPlayerId = playerInfo.id;
        console.log("I am Player ID: " + window.myPlayerId);
        updateStartButtonVisibility(); // Re-evaluate button now that ID is confirmed
    });

    socket.on("joinedSuccess", (playerInfo) => {
        window.myPlayerId = playerInfo.id;
        updateStartButtonVisibility(); // Re-evaluate button now that ID is confirmed
    });

    socket.on("updatePlayers", (players) => {
        let statusText = "PLAYERS IN ROOM " + window.myRoomCode + ":<br><br>";
        players.forEach(p => {
            statusText += "🟢 " + p.name + " (Player " + (p.id + 1) + ")<br>";
            window.playerNames[p.id] = p.name; 
        });
        document.getElementById("lobby-status").innerHTML = statusText;

        window.currentPlayersCount = players.length;
        updateStartButtonVisibility();
    });

    socket.on("roomUpdated", (players) => {
        let statusText = "PLAYERS IN ROOM " + window.myRoomCode + ":<br><br>";
        players.forEach(p => {
            statusText += "🟢 " + p.name + " (Player " + (p.id + 1) + ")<br>";
            window.playerNames[p.id] = p.name; 
        });
        document.getElementById("lobby-status").innerHTML = statusText;
        
        window.currentPlayersCount = players.length;
        updateStartButtonVisibility();
    });

    socket.on("joinError", (msg) => {
        showNotification(msg + " - Reloading in 5 seconds...");
        setTimeout(() => window.location.reload(), 5000);
    });

    socket.on("roomFull", () => {
        showNotification("Room is full! Try a different code. Reloading...");
        setTimeout(() => window.location.reload(), 4000);
    });
    
    socket.on("hostLeft", () => {
        showNotification("The host disconnected! Room closed. Reloading...");
        setTimeout(() => window.location.reload(), 3000);
    });
    
    socket.on("roomClosed", () => {
        showNotification("The room has been closed.");
        setTimeout(() => window.location.reload(), 2000);
    });

    // --- GAME SYNC LOGIC ---
    function startMultiplayerGame() {
        socket.emit("startGame", window.myRoomCode);
    }

    socket.on("gameStarted", (playersData) => {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        window.activePlayers = playersData; 
        checkHostUI(); // Show media player if host
        startPhaserGame(); 
    });

    socket.on("diceRolled", ({ diceValue, playerId }) => {
        if (window.gameScene) {
            window.gameScene.currentPlayerIndex = playerId;
            window.gameScene.updateTurnUI();
            window.gameScene.receiveDiceRoll(diceValue);
        }
    });

    socket.on("pieceMoved", ({ playerId, pieceIndex }) => {
        if (window.gameScene) {
            window.gameScene.receivePieceMove(playerId, pieceIndex);
        }
    });

    function startPhaserGame() {
        new Phaser.Game({
            type: Phaser.AUTO,
            width: 1200, 
            height: 1200, 
            transparent: true,
            parent: "game-container", 
            scene: LudoGame,
            // ADD THIS FPS BLOCK:
            fps: {
                target: 60,
                forceSetTimeOut: true, // Uses background-safe timers instead of requestAnimationFrame
                deltaHistory: 10,
                panicMax: 120 // Prevents the "Delta Explosion" crash when returning to the tab
            }
        });
    }
    // --- CHAT LOGIC ---
    function sendChat(msg) {
        const myName = document.getElementById("playerName").value || "Player";
        
        socket.emit("sendChat", { 
            roomCode: window.myRoomCode, 
            playerName: myName, 
            message: msg 
        });
    }    // --- CUSTOM CHAT LOGIC ---
    function sendCustomMessage() {
        const inputBox = document.getElementById("customChatInput");
        const msg = inputBox.value.trim();
        const myName = document.getElementById("playerName").value || "Player"; // Fallback if name is empty
        
        if (msg !== "") {
            // Send the message to the server
            socket.emit("sendChat", { 
                roomCode: window.myRoomCode, 
                playerName: myName, 
                message: msg 
            });
            
            inputBox.value = ""; // Clear the box after sending
        }
    }

    // Allow pressing "Enter" on the keyboard to send the message
    document.getElementById("customChatInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault(); // Stop default form submission
            sendCustomMessage();
        }
    });

    // Receive chat messages from the server and display them
    // --- UNIVERSAL CHAT RECEIVER ---
    socket.on("receiveChat", (data) => {
        const chatBox = document.getElementById("chat-messages");
        if (!chatBox) return;

        const msgDiv = document.createElement("div");
        
        let sender = "Player";
        let text = "";

        // 1. Check if the server sent an object (Our new custom chat)
        if (typeof data === 'object' && data !== null) {
            sender = data.playerName || "Player";
            text = data.message || data.msg || data.text || "";
        } 
        // 2. Check if the server just sent a pure string (Old Quick Chat fallback)
        else {
            text = data; 
        }

        // Only print if there is actual text
        if (text.trim() !== "") {
            msgDiv.innerHTML = `<strong style="color: #a855f7;">${sender}:</strong> <span style="color: #fff;">${text}</span>`;
            chatBox.appendChild(msgDiv);
            
            // Auto-scroll to the newest message
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });
    let audioCtx;

    function activateKeepAliveHack() {
        const startAudio = () => {
            // 1. Create the Audio Context
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // 2. Resume if suspended by the browser
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 3. Create a silent continuous sound wave
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // Set volume to absolutely zero (silent)
            gainNode.gain.value = 0; 
            
            // Connect and play
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            
            console.log("🟢 Web Audio Keep-Alive Active! State:", audioCtx.state);
            
            // Remove listeners so it only triggers once
            document.removeEventListener('click', startAudio);
            document.removeEventListener('touchstart', startAudio);
        };

        // Attach to the first user interaction
        document.addEventListener('click', startAudio, { once: true });
        document.addEventListener('touchstart', startAudio, { once: true });
    }

    // Initialize
    activateKeepAliveHack();

    // --- YOUTUBE LOGIC ---
    let ytPlayer;
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('yt-player-container', {
            height: '130', // Set height for preview
            width: '100%', // Set width for preview
            videoId: '', 
            playerVars: { 
                'autoplay': 1, 
                'controls': 1, // Show basic YouTube controls in the preview
                'disablekb': 1 
            }
        });
    }

    function extractVideoID(url) {
        let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        let match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : url; 
    }

    function broadcastMedia() {
        const rawInput = document.getElementById("ytVideoId").value;
        
        // NEW: Check if the user pasted a Playlist link
        const listMatch = rawInput.match(/[?&]list=([^#\&\?]+)/);
        
        if (listMatch) {
            // It's a playlist, broadcast the playlist ID
            socket.emit("playMedia", { roomCode: window.myRoomCode, playlistId: listMatch[1] });
        } else {
            // It's a single video, broadcast the video ID
            const vidId = extractVideoID(rawInput); 
            socket.emit("playMedia", { roomCode: window.myRoomCode, videoId: vidId });
        }
    }

    socket.on("syncMedia", (data) => {
        if (!ytPlayer) return;
        
        if (data.playlistId && ytPlayer.loadPlaylist) {
            ytPlayer.loadPlaylist({ list: data.playlistId });
        } else if (data.videoId && ytPlayer.loadVideoById) {
            ytPlayer.loadVideoById(data.videoId);
        }
        
        ytPlayer.setVolume(document.getElementById("volSlider").value);
    });

    function changeVolume() {
        const newVol = document.getElementById("volSlider").value;
        if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(newVol);
        if (window.myPlayerId === 0) { 
            socket.emit("changeVolume", { roomCode: window.myRoomCode, volume: newVol });
        }
    }

    socket.on("syncVolume", (volume) => {
        document.getElementById("volSlider").value = volume;
        if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(volume);
    });

    // NEW: Send Media Controls (Host only)
    function sendMediaControl(action) {
        if (window.myPlayerId === 0) {
            socket.emit("mediaControl", { roomCode: window.myRoomCode, action: action });
        }
    }

    // NEW: Receive Media Controls (Everyone)
    socket.on("syncMediaControl", (action) => {
        if (!ytPlayer) return;
        
        if (action === 'toggle') {
            const state = ytPlayer.getPlayerState();
            if (state === 1) { // 1 means Playing
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        } else if (action === 'next') {
            ytPlayer.nextVideo();
        } else if (action === 'prev') {
            ytPlayer.previousVideo();
        }
    });

    function checkHostUI() {
        if (window.myPlayerId === 0) {
            document.getElementById("media-panel").style.display = "block";
        }
    }



    // --- UTILS ---
    // --- UPDATED NOTIFICATION FUNCTION ---
    function showNotification(message) {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = 'mica-notification';
        notif.innerText = message;
        
        // Ensure it's added to the top of the list visually
        container.insertBefore(notif, container.firstChild);
        
        setTimeout(() => notif.classList.add('show'), 10);
        
        // Auto-remove notification from DOM
        setTimeout(() => {
            notif.classList.remove('show');
            setTimeout(() => notif.remove(), 300); 
        }, 4500);
    }
</script>
<script>
    function makeDraggable(element) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        
        // Use the panel's top label as the drag handle. If it doesn't have one, use the whole panel.
        let dragHandle = element.querySelector('.label') || element;
        
        dragHandle.style.cursor = 'grab';
        
        dragHandle.onmousedown = function(e) {
            // Do not start dragging if trying to click a button or type in an input
            if (['INPUT', 'BUTTON', 'TEXTAREA', 'SPAN'].includes(e.target.tagName)) return;
            
            e.preventDefault();
            
            // Bring the currently dragged panel to the front
            document.querySelectorAll('.mica-panel, .setup-card').forEach(p => p.style.zIndex = '10');
            element.style.zIndex = '100';
            
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
            dragHandle.style.cursor = 'grabbing';
        };

        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            
            // Clear 'bottom' or 'right' CSS constraints so the panel moves freely
            element.style.bottom = 'auto';
            element.style.right = 'auto';
            
            element.style.top = (element.offsetTop - pos2) + "px";
            element.style.left = (element.offsetLeft - pos1) + "px";
        }

        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
            dragHandle.style.cursor = 'grab';
        }
    }

    // Apply the drag logic to the panels as soon as the page loads
    window.addEventListener("DOMContentLoaded", () => {
        const panels = ['ui-panel', 'chat-panel', 'media-panel'];
        panels.forEach(id => {
            const el = document.getElementById(id);
            if (el) makeDraggable(el);
        });

        // Make the initial setup lobby card movable too
        const setupCard = document.querySelector('.setup-card');
        if (setupCard) makeDraggable(setupCard);
    });
    
</script>
<audio id="diceSound" src="assets/dice-roll.mp3" preload="auto"></audio>
<script>
    // Create an inline Web Worker to keep the tab alive in the background
    const keepAliveCode = `
        setInterval(() => {
            postMessage('ping');
        }, 10000); // Ping every 10 seconds
    `;
    const blob = new Blob([keepAliveCode], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));
    
    worker.onmessage = function(e) {
        if (e.data === 'ping' && window.socket && window.socket.connected) {
            // Keep the socket connection active
            window.socket.emit("keepAlivePing"); 
        }
    };
</script>
<script>
    document.body.addEventListener('click', function() {
        // If Phaser is loaded and the audio is asleep, wake it up!
        if (window.gameScene && window.gameScene.sound && window.gameScene.sound.context) {
            if (window.gameScene.sound.context.state === 'suspended') {
                window.gameScene.sound.context.resume();
                console.log("Audio Engine Unlocked!");
            }
        }
    }, true); // 'true' ensures it catches the click immediately
</script>
</body>
</html>
