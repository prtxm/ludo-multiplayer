<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            window.location.href = "mobile.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>6 Player Ludo - Dark Mica Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div id="notification-container"></div>
<div id="setup-screen">
    <div class="setup-card">
        <h1>MULTIPLAYER LUDO</h1>
        <p>Enter your name and a Room Code</p>
        
        <div class="input-grid" style="grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px;">
            <div class="input-group">
                <input type="text" id="playerName" placeholder="Your Name (e.g., Rahul)" class="mica-input" style="width: 90%;">
            </div>
            <div class="input-group">
                <input type="text" id="roomCode" placeholder="Room Code (e.g., 1234)" class="mica-input" style="width: 90%;">
            </div>
        </div>

        <button class="action-btn" onclick="joinMultiplayerRoom()">JOIN / CREATE ROOM</button>
        
        <div id="lobby-status" style="margin-top: 20px; color: #4fc3f7; font-weight: bold;"></div>
        
        <button id="startGameBtn" class="action-btn" onclick="startMultiplayerGame()" style="margin-top: 15px; display: none; background: #00c853;">START GAME (HOST ONLY)</button>
    </div>
</div>

<div id="game-ui" style="display: none;">
    
    <div id="ui-panel" class="mica-panel">
        <div class="label">Current Turn</div>
        <div id="turnDisplay">RED'S TURN</div>
        
        <div class="label">Dice Result</div>
        <div id="diceDisplay">🎲 -</div>
        <button id="rollBtn" onclick="gameScene.rollFromUI()">ROLL DICE</button>

        <hr class="mica-divider">
        
        <div class="label">Scoreboard</div>
        <div id="scoreboard">
            </div>
    </div>

    <div id="game-container"></div>
</div>

<script src="game.js"></script>
<script>
    // Initialize Socket Connection
    const socket = io();
    window.socket = socket; 
    window.myPlayerId = 0;
    window.myRoomCode = "";
    window.playerNames = ["Player 1", "Player 2", "Player 3", "Player 4", "Player 5", "Player 6"]; // Defaults

    function joinMultiplayerRoom() {
        const name = document.getElementById("playerName").value;
        const code = document.getElementById("roomCode").value;
        // 1. Force the mobile keyboard to hide and remove focus from inputs
        document.getElementById('playerName').blur();
        document.getElementById('roomCode').blur();
        
        // 2. Force the browser to snap back to the top-left corner
        window.scrollTo(0, 0);
        
        if (!name || !code) {
            showNotification("Please enter both a Name and a Room Code!");
            return;
        }
        
        window.myRoomCode = code;
        socket.emit("joinRoom", { playerName: name, roomCode: code });
        document.getElementById("lobby-status").innerText = "Connecting to room...";
    }

    // Server confirms we joined
    socket.on("joined", (playerInfo) => {
        window.myPlayerId = playerInfo.id;
        console.log("I am Player ID: " + window.myPlayerId);
    });

    // Listen for the server telling us the room was destroyed
    socket.on("roomClosed", () => {
        showNotification("The host disconnected! The room has been closed.");
        window.location.reload(); // Instantly refresh the page to reset the game
    });

    // Server sends updated list of players in the room
    socket.on("updatePlayers", (players) => {
        let statusText = "PLAYERS IN ROOM " + window.myRoomCode + ":<br><br>";
        
        players.forEach(p => {
            statusText += "🟢 " + p.name + " (Player " + (p.id + 1) + ")<br>";
            window.playerNames[p.id] = p.name; // Save their names for Phaser
        });
        
        document.getElementById("lobby-status").innerHTML = statusText;
        
        // If I am the Host (Player 0) and someone else is here, show the Start button!
        if (window.myPlayerId === 0 && players.length >= 1) {
            document.getElementById("startGameBtn").style.display = "block";
        }
    });

    socket.on("roomFull", () => {
        showNotification("This room is full! Max 6 players.");
    });

    // Host clicks Start Game
    function startMultiplayerGame() {
        socket.emit("startGame", window.myRoomCode);
    }

    // Server tells EVERYONE in the room to start the game at the exact same time
    socket.on("gameStarted", (playersData) => {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        
        // Save joined players globally so game.js can read them
        window.activePlayers = playersData; 
        
        startPhaserGame(); // Boot Phaser!
    });

    // --- NEW: IN-GAME MULTIPLAYER SYNC ---

    // When someone else rolls the dice
    // When someone else rolls the dice
    socket.on("diceRolled", ({ diceValue, playerId }) => {
        if (window.gameScene) {
            // 🚨 FORCE SYNC the turn here too!
            window.gameScene.currentPlayerIndex = playerId;
            window.gameScene.updateTurnUI();
            
            window.gameScene.receiveDiceRoll(diceValue);
        }
    });

    // When someone else moves a piece
    socket.on("pieceMoved", ({ playerId, pieceIndex }) => {
        if (window.gameScene) {
            window.gameScene.receivePieceMove(playerId, pieceIndex);
        }
    });

    function startPhaserGame() {
        new Phaser.Game({
            type: Phaser.AUTO,
            width: 1200,
            height: 1200,
            transparent: true,
            parent: "game-container",
            scene: LudoGame
        });
    }

    function showNotification(message) {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = 'mica-notification';
        notif.innerText = message;
        
        container.appendChild(notif);

        // Slight delay to trigger the CSS slide-in animation
        setTimeout(() => notif.classList.add('show'), 10);

        // Remove the notification after 3.5 seconds
        setTimeout(() => {
            notif.classList.remove('show');
            setTimeout(() => notif.remove(), 300); 
        }, 3500);
    }
</script>
</body>
</html>
