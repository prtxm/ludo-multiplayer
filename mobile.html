<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ludo Mobile - Dark Mica</title>
    <link rel="stylesheet" href="mobile.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="notification-container"></div>

<div id="setup-screen">
    <div class="setup-card">
        <h1>LUDO MOBILE</h1>
        <p>Enter your name and a Room Code</p>
        
        <div class="input-grid">
            <input type="text" id="playerName" placeholder="Your Name" class="mica-input">
            <input type="text" id="roomCode" placeholder="Room Code" class="mica-input">
        </div>

        <button class="action-btn join-btn" onclick="joinMultiplayerRoom()">JOIN / CREATE ROOM</button>
        
        <div id="lobby-status"></div>
        <div id="player-list"></div>

        <button id="start-btn" class="action-btn start-game-btn" style="display:none;" onclick="startMultiplayerGame()">START GAME</button>
    </div>
</div>

<div id="game-ui" style="display: none;">
    <div id="phaser-container"></div>
    
    <div class="mobile-controls-panel">
        <div class="mica-inner">
            <h2 id="turnDisplay">Waiting for Host...</h2>
            <div id="diceDisplay">🎲 --</div>
            <button id="rollButton" class="action-btn roll-btn">ROLL DICE</button>
        </div>
    </div>
</div>

<script src="game.js"></script>
<script>
    const socket = io();
    window.myPlayerId = null;
    window.myRoomCode = null;

    function showNotification(message) {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = 'mica-notification';
        notif.innerText = message;
        container.appendChild(notif);
        setTimeout(() => notif.classList.add('show'), 10);
        setTimeout(() => {
            notif.classList.remove('show');
            setTimeout(() => notif.remove(), 300); 
        }, 3500);
    }

    function joinMultiplayerRoom() {
        const name = document.getElementById("playerName").value.trim();
        const code = document.getElementById("roomCode").value.trim();
        if(!name || !code) return showNotification("Please fill all fields!");
        window.myRoomCode = code;
        socket.emit("joinRoom", { playerName: name, roomCode: code });
    }

    socket.on("joined", (info) => {
        window.myPlayerId = info.id;
        showNotification("Lobby Joined!");
        document.getElementById("lobby-status").innerText = `Room: ${window.myRoomCode}`;
    });

    socket.on("updatePlayers", (players) => {
        const list = document.getElementById("player-list");
        list.innerHTML = players.map(p => `
            <div class="player-item">
                <span class="dot" style="background:${getPlayerColor(p.id)}"></span>
                ${p.name} ${p.id === 0 ? '<b>(HOST)</b>' : ''}
            </div>
        `).join('');
        
        if (window.myPlayerId === 0 && players.length >= 2) {
            document.getElementById("start-btn").style.display = "block";
        }
    });

    function getPlayerColor(id) {
        return ["#ff0000", "#00c853", "#ff6f00", "#00bcd4", "#ffeb3b", "#9c27b0"][id];
    }

    function startMultiplayerGame() {
        socket.emit("startGame", window.myRoomCode);
    }

    socket.on("gameStarted", (playersData) => {
        window.activePlayers = playersData;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        startPhaserGame();
    });

    socket.on("roomClosed", () => {
        alert("Host disconnected. Room closed.");
        window.location.reload();
    });

    socket.on("diceRolled", ({ diceValue, playerId }) => {
        if (window.gameScene) {
            window.gameScene.currentPlayerIndex = playerId;
            window.gameScene.updateTurnUI();
            window.gameScene.receiveDiceRoll(diceValue);
        }
    });

    socket.on("pieceMoved", ({ playerId, pieceIndex }) => {
        if (window.gameScene) window.gameScene.receivePieceMove(playerId, pieceIndex);
    });

    function startPhaserGame() {
        const screenW = window.innerWidth;
        const scaleVal = screenW / 1200;
        
        new Phaser.Game({
            type: Phaser.AUTO,
            scale: {
                mode: Phaser.Scale.NONE,
                parent: 'phaser-container',
                width: screenW,
                height: screenW
            },
            scene: [LudoGame],
            backgroundColor: "#00000000",
            transparent: true,
            callbacks: {
                postBoot: (game) => {
                    const scene = game.scene.scenes[0];
                    scene.cameras.main.setZoom(scaleVal);
                    scene.cameras.main.centerOn(600, 600);
                }
            }
        });
    }

    // Fast Touch for Mobile
    document.addEventListener('touchstart', (e) => {
        if (e.target.id === 'rollButton' && !e.target.disabled) {
            e.preventDefault();
            e.target.click();
        }
    }, {passive: false});
</script>
</body>
</html>
